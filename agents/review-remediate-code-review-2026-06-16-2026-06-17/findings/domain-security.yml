    file: packages/auth-magic-link/src/store.ts
    line: 29
    plan_ref: "#191 / ADR D6 — SHA-256 token hashing at rest"
    summary: >
      SHA-256 hash-at-rest is correctly implemented in both memory and ORM stores.
      The comment correctly justifies unsalted SHA-256 for high-entropy random tokens
      (32 bytes from crypto.randomBytes) — this is the standard practice for token
      hashing (e.g., GitHub personal access tokens). The documented-bearer model (#190)
      is sound: cross-device magic-link by design cannot bind to tx.state. The
      security rests on 32-byte entropy + short TTL + atomic single-use consumption
      + hash-at-rest — all verified as implemented.
