name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release via Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN intentionally absent — per technical-hardening-sprint plan v1.1 EC-2
          # absorbed: NPM_TOKEN env DISABLES OIDC trusted-publisher binding silently.
          # npm CLI prioritizes token auth over the OIDC token from id-token: write
          # permission, so --provenance silently no-ops. Without NPM_TOKEN, npm CLI
          # uses the GitHub Actions OIDC token automatically (requires npm dashboard
          # trusted-publisher binding configured at npmjs.com/package/<pkg>/settings).
          NPM_CONFIG_PROVENANCE: true
