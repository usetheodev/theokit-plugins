  - id: F-tests-1-interleaving-model
    severity: LOW
    file: packages/plugin-copilot/tests/runtime.test.ts
    line: 750
    plan_ref: "T1.2 — idle+broadcast double-spend regression test (F-tests-1, HIGH)"
    domain_anchor: "enqueue() per-copilot serialization queue; BudgetBridge.reserve atomic check+hold"
    summary: "The test models concurrent interleaving correctly in principle, but a subtle timing concern may make the test less deterministic under vitest's fake-timer implementation: after 'resolveAgent()' and 'await vi.advanceTimersByTimeAsync(50)', the test relies on Task-I (the idle task, enqueued via the scheduleIdleCheck timer callback) completing its full reserve()→budget-exceeded→broadcastEvent cycle before the assertion at line 806. The 50ms advance is generous for a synchronous reserve() + broadcast, but the BORN-GREEN label in the comment and the lack of a more structural assertion (e.g., polling getUsage until stable) means a slow test runner could observe the assertion before Task-I completes the budget-exceeded broadcast."
    evidence: |
      # After resolveAgent(), Task-B settles (reconcile → 0.01 spent).
      # Task-I then dequeues, enters reserve() → exceeds daily → broadcastEvent("budget-exceeded").
      # The test asserts both 0.01 usage AND the budget-exceeded broadcast.
      resolveAgent();
      await vi.advanceTimersByTimeAsync(50);   # 50ms fake-timer advance — relies on Task-I completing
      expect(rt.getUsage("spend")?.dailyUsedUsd).toBeCloseTo(0.01, 4);
      expect(onResponse).toHaveBeenCalledOnce();
      expect(provider.broadcasts.some((b) => b.event === "budget-exceeded")).toBe(true);
      # The serialization queue runs Task-I via Promise microtasks, not via timers.
      # vi.advanceTimersByTimeAsync does flush microtasks in vitest (internally calls
      # await Promise.resolve() between timer ticks), so this should be reliable.
      # However, the guarantee is implementation-specific to vitest's fake-timer bridge.
    recommended_action: "LOW — acceptable for a BORN-GREEN regression guard. Consider adding an explicit 'await Promise.resolve()' after 'resolveAgent()' before the timer advance to more explicitly drain the reconcile microtask before queuing the idle check. Not a blocker; the test is structurally sound given vitest fake-timer behavior."

