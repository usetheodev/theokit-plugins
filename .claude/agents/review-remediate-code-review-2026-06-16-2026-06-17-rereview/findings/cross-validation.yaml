findings:
  - id: F-xval-1
    severity: LOW
    file: packages/plugin-copilot/tests/runtime.test.ts
    line: 257
    plan_ref: "T2.1 TDD block + Drawbacks 'a 2-copilot retention test'"
    summary: >
      T2.1 test does not directly assert the sibling-retention sub-criterion. The plan's
      TDD block states "unregister one → cursor RETAINED; unregister both → cursor deleted."
      The implemented test goes directly from both-active to both-unregistered, then
      re-registers. It proves pruning-on-empty + correct fresh-start rotation, but never
      directly asserts that unregistering ONE copilot while a sibling remains leaves the
      cursor in place. The Drawbacks section required "a 2-copilot retention test" —
      only the "empty-room prune" half is directly asserted; the "sibling retention"
      half is implied (the ADR guard is correct, but the test contract is incomplete).
    evidence: |
      Plan TDD (plan.md): "RED: test_round_robin_cursor_pruned_when_room_empties() --
        register 2 copilots same room; unregister one -> cursor retained;
        unregister both -> cursor+decision deleted"
      Implemented test (runtime.test.ts:257-295):
        - Registers alpha + beta, fires frame (cursor advances to 1).
        - Immediately unregisters BOTH (no intermediate single-unregister assertion).
        - Re-registers delta + epsilon; asserts delta responds first (cursor reset to 0).
      Missing: no intermediate assertion after "unregister alpha only, beta still active"
      that verifies roundRobinCursor for room-1 is NOT deleted.
      The production guard (copilotsInRoom check) is correct and the test does exercise
      it indirectly, but the explicit "retained while sibling" assertion is absent.
      Drawbacks table (plan.md:451): "a 2-copilot retention test" required.
    recommended_action: >
      Add an intermediate assertion between the two unregister calls:
        await rt.unregisterCopilot("alpha");   // beta still active
        // assert cursor is still in play: fire another broadcast → beta (not delta) responds
        // or: rt.copilotsInRoom("room-1").length === 1 and round-robin still works
        await rt.unregisterCopilot("beta");    // room now empty → maps pruned
      This closes the explicit sibling-retention AC gap. Low severity because the
      production guard is implemented correctly; the gap is test-coverage completeness.

  - id: F-xval-2
    severity: INFO
    file: packages/plugin-copilot/tests/runtime.test.ts
    line: 247
    plan_ref: "pre-existing F-tests-3 from prior review"
    summary: >
      T2.1 (lines 273, 289) and T2.2 (line 745) new tests use setTimeout(30ms) real timers
      to drain the async queue — the same latent flakiness pattern flagged as MEDIUM F-tests-3
      in the prior review. These tasks are not responsible for introducing the pattern
      (it is pre-existing across the file), but they do add 2 more occurrences. Not a
      regression introduced by this fix-plan; continuation of existing debt.
    evidence: |
      T2.1 test (runtime.test.ts:273): await new Promise((r) => setTimeout(r, 30));
      T2.1 test (runtime.test.ts:289): await new Promise((r) => setTimeout(r, 30));
      T2.2 test (runtime.test.ts:745): await new Promise((r) => setTimeout(r, 30));
      F-tests-3 (prior review) already flagged 7 occurrences. These add 3 more.
      T1.2 (F-tests-1) correctly uses vi.useFakeTimers() / vi.advanceTimersByTimeAsync.
    recommended_action: >
      Track as part of the broader F-tests-3 debt. A follow-up task should introduce a
      `drainForTest()` helper on CopilotRuntime (guarded by NODE_ENV=test) that awaits
      all queued microtasks without relying on real-time sleeps. Not blocking for this
      review cycle — pre-existing pattern, no regression.

  - id: F-xval-3
    severity: INFO
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 187
    plan_ref: "F-arch-2 review finding recommended action"
    summary: >
      The prior review's F-arch-2 recommended action said "Apply the same pattern in
      deactivate()." Plan T2.1 deliberately scoped only to unregisterCopilot (ADR D2).
      deactivate() is a "pause, not remove" operation — it does not delete from registry,
      so copilotsInRoom() would still count the deactivated copilot. Pruning in deactivate
      would incorrectly prune the Maps for a copilot still in the registry (just inactive),
      potentially breaking rotation when the copilot is re-activated. The narrowed scope
      is architecturally correct. Documented here for auditor awareness; no action needed.
    evidence: |
      deactivate() (runtime.ts:187-202): sets reg.active = false, drains queue, calls
        member.leave() — does NOT delete from this.registry.
      copilotsInRoom() (runtime.ts:354-360): counts ALL entries in registry regardless
        of active flag. After deactivate, copilot is still in registry → copilotsInRoom > 0
        → prune guard would NOT fire anyway. The recommendation was therefore over-specified;
        the fix in unregisterCopilot is sufficient for the actual leak scenario.
    recommended_action: none

