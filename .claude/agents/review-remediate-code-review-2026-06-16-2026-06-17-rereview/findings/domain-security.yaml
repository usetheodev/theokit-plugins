  # ─── F-arch-1 / F-sec-1 ────────────────────────────────────────────────────
  - id: F-sec-1-a
    severity: INFO
    file: packages/plugin-canvas/src/ui/renderers/sanitize.ts
    line: 144
    plan_ref: F-arch-1 / F-sec-1
    domain_anchor: "ADR D2 — derive security verdict from DOMPurify.removed, not input/output regex"
    summary: >
      sanitizeHtmlSrcdoc now correctly derives its verdict from DOMPurify.removed
      with WHOLE_DOCUMENT:true. The unquoted <meta http-equiv=refresh> bypass
      from the original code is closed. Fix is sound for the documented threat
      surface (meta-refresh, iframe, embed, object, on-handler, js:/data: URLs).
    evidence: |
      FORBID_TAGS: ['meta', 'script', 'iframe', 'object', 'embed'] combined with
      WHOLE_DOCUMENT:true ensures DOMPurify records the meta removal before the
      fragment parser can silently discard it. The OR-fold into removedScript
      covers all dangerous-removal signals for the enforceArtifactSecurity gate.
      Test at packages/plugin-canvas/tests/sanitize.test.ts:141 (test_unquoted_meta_refresh_srcdoc_is_flagged)
      confirms the previously-bypassed vector is now caught.
    recommended_action: No action required. Fix is complete and correct.

  - id: F-sec-1-b
    severity: LOW
    file: packages/plugin-canvas/src/ui/renderers/sanitize.ts
    line: 84
    plan_ref: F-arch-1 / F-sec-1
    domain_anchor: "classifyRemovedAttribute data: URL regex coverage"
    summary: >
      classifyRemovedAttribute flags only data:text/html and
      data:application/javascript. The alternative MIME types
      data:text/javascript and data:application/x-javascript are
      NOT matched, so removedDataUrl stays false for those variants.
      This is a pre-existing gap in the boundary gate, NOT introduced
      by the current fix.
    evidence: |
      Line 84:
        if (/^\s*data:(?:text\/html|application\/javascript)/i.test(attrValue)) {
          report.removedDataUrl = true
        }
      Tested:
        /^\s*data:(?:text\/html|application\/javascript)/i.test('data:text/javascript,alert(1)') -> false
        /^\s*data:(?:text\/html|application\/javascript)/i.test('data:application/x-javascript,alert(1)') -> false
      DOMPurify DOES strip these from the output (ALLOW_DATA_ATTR:false + default protocol deny),
      so the sanitized output is safe. Only the boundary gate verdict is incomplete.
      Render-time re-sanitization (HtmlArtifact calls sanitizeHtmlSrcdoc again) is the
      defense-in-depth backstop.
    recommended_action: >
      Extend the regex to cover additional JS MIME aliases:
        /^\s*data:(?:text\/html|(?:text|application)\/(?:javascript|x-javascript))/i
      This tightens the boundary gate without affecting the already-correct sanitized output.
      Priority: LOW — output is clean; gate gap only allows artifact STORAGE of content
      that is sanitized again at render time.

  - id: F-sec-1-c
    severity: LOW
    file: packages/plugin-canvas/src/ui/renderers/sanitize.ts
    line: 160
    plan_ref: F-arch-1 / F-sec-1
    domain_anchor: "DOMPurify WHOLE_DOCUMENT base tag passthrough"
    summary: >
      <base href="https://attacker.com/"> is NOT in FORBID_TAGS for
      sanitizeHtmlSrcdoc. DOMPurify allows <base> by default in HTML
      mode. A well-formed https base href passes through the sanitizer
      and the boundary gate undetected. In the rendered srcdoc iframe,
      this redirects ALL relative resource loads (images, stylesheets,
      links) to the attacker-controlled domain.
    evidence: |
      FORBID_TAGS for sanitizeHtmlSrcdoc (line 160):
        ['meta', 'script', 'iframe', 'object', 'embed']
      'base' is absent. DOMPurify default HTML allowlist includes <base>.
      A <base href="https://attacker.com/"> is a valid HTTPS URL — it is
      not flagged by removedJsUrl, removedDataUrl, or any other report field.
      Impact: With sandbox="allow-scripts" an external stylesheet loaded via
      relative URL could perform CSS attribute-selector exfiltration against
      the srcdoc content. Script execution within the sandboxed iframe is not
      blocked by the base tag (scripts need ALLOW-scripts + a script tag/src),
      but CSS injection is a realistic exfiltration vector.
      With sandbox="" (minimal, default) the risk is images/CSS being loaded
      from an attacker domain (tracking, content replacement) — not RCE.
    recommended_action: >
      Add 'base' to FORBID_TAGS in sanitizeHtmlSrcdoc. Also add 'base' to the
      REMOVED_ELEMENT_FLAG map (mapped to 'removedIframe' or a new 'removedNavigation'
      key) so the boundary gate fires. The change is contained to sanitize.ts and
      does not touch schema.ts.
        FORBID_TAGS: ['base', 'meta', 'script', 'iframe', 'object', 'embed']
      Priority: LOW — primary script-execution vector is defended by sandbox;
      this closes the CSS-injection / resource-redirection residual.

  # ─── F-sec-2 ────────────────────────────────────────────────────────────────
  - id: F-sec-2-a
    severity: INFO
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 406
    plan_ref: F-sec-2
    domain_anchor: "OWASP LLM01 — fence-marker prompt injection isolation"
    summary: >
      frameUntrusted now strips fence markers to a fixpoint. The
      single-pass bypass (nested payload reconstructing a marker after
      one strip) is closed. The loop terminates because each iteration
      strictly shrinks the string by removing at least one marker literal.
    evidence: |
      Verified by tracing:
        input: '<<<UNTRUSTED_USER<<<UNTRUSTED_USER_INPUT>>>_INPUT>>>'
        single-pass output: '<<<UNTRUSTED_USER_INPUT>>>'  ← bypass succeeded (pre-fix)
        fixpoint output:    ''                              ← bypass closed (post-fix)
      Tests at packages/plugin-copilot/tests/runtime.test.ts:815-872 cover nested
      marker reconstruction (Vectors A/B/C/D including ≥3-pass deep nesting).
      Casing/homoglyph variants are documented as out-of-scope (accepted limitation).
    recommended_action: No action required. Fix is complete and correct.

  - id: F-sec-2-b
    severity: INFO
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 406
    plan_ref: F-sec-2
    domain_anchor: "Case sensitivity of fence markers"
    summary: >
      The fixpoint loop is case-sensitive (split on exact constant literals).
      A lowercase variant '<<<untrusted_user_input>>>' is NOT stripped.
      This was declared out-of-scope in the fix comment; confirmed here as
      an accepted residual, not a missed fix.
    evidence: |
      UNTRUSTED_OPEN = '<<<UNTRUSTED_USER_INPUT>>>'  (UPPER_CASE)
      '<<<untrusted_user_input>>>'.split(UNTRUSTED_OPEN).join('') -> '<<<untrusted_user_input>>>'
      The LLM receiving the framed prompt sees the lowercase variant as DATA text,
      not as a recognized fence marker. The model is instructed to treat everything
      between the UPPER_CASE markers as untrusted DATA, so lowercase injection
      attempts would appear inside the DATA fence and remain untrusted.
    recommended_action: No action required per documented scope.

  # ─── F-sec-3 ────────────────────────────────────────────────────────────────
  - id: F-sec-3-a
    severity: INFO
    file: packages/auth-google/src/index.ts
    line: 59
    plan_ref: F-sec-3
    domain_anchor: "SSRF guard — isLoopbackHost 0.0.0.0 exclusion"
    summary: >
      0.0.0.0 (INADDR_ANY wildcard bind address) is now correctly
      excluded from the loopback-exempt set. An OIDC discovery doc
      pointing http://0.0.0.0:PORT was previously accepted as a
      loopback exemption; it is now rejected as an insecure plaintext
      URL. The URL parsing normalization note (http://0/ → 0.0.0.0)
      is documented and correct.
    evidence: |
      isLoopbackHost('0.0.0.0') -> false (post-fix, correct)
      assertSafeOidcUrl('http://0.0.0.0:8080/token', ...) throws GoogleAuthError
        code: 'insecure_oidc_url' (post-fix)
      Test at packages/auth-google/tests/google-provider.test.ts:328
        (F-sec-3: 0.0.0.0 is NOT loopback) covers this vector.
      IPv6 unspecified [::] was documented as "never in this set" — confirmed
      it is not in the allowlist and isLoopbackHost('[::]') → false (correct).
    recommended_action: No action required. Fix is complete and correct.

  - id: F-sec-3-b
    severity: LOW
    file: packages/auth-google/src/index.ts
    line: 66
    plan_ref: F-sec-3
    domain_anchor: "IPv4-mapped IPv6 loopback detection gap"
    summary: >
      isLoopbackHost does NOT recognize IPv4-mapped IPv6 loopback
      addresses. new URL('http://[::ffff:127.0.0.1]').hostname
      normalizes to '[::ffff:7f00:1]', which fails both the 127.x.x.x
      regex and the explicit [::1]/::1/localhost checks. This makes
      the function over-restrictive: a legitimate OIDC test sidecar
      using the IPv4-mapped form would be incorrectly rejected.
    evidence: |
      node: new URL('http://[::ffff:127.0.0.1]').hostname → '[::ffff:7f00:1]'
      isLoopbackHost('[::ffff:7f00:1]') → false
      /^127\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test('[::ffff:7f00:1]') → false
      Security direction: CONSERVATIVE (fail-closed). This does NOT allow
      a non-loopback attacker address to be treated as loopback. The only
      consequence is that NODE_ENV=test mocks on [::ffff:127.x.x.x] hosts
      would be rejected with 'insecure_oidc_url' rather than passing.
      No known attacker-controlled IP can pass the current check; the gap
      is in the loopback allowance (over-blocking), not in the security gate.
    recommended_action: >
      Add IPv4-mapped IPv6 loopback detection to isLoopbackHost:
        if (/^\[::ffff:(?:7f[0-9a-f]{2}:[0-9a-f]{4}|127\.\d{1,3}\.\d{1,3}\.\d{1,3})\]$/i.test(hostname)) return true;
      This is a correctness fix (avoids false-rejecting legit loopback mocks),
      not a security fix. Priority: LOW — current behavior is safe but overly strict.

  # ─── F-dom-pay-5 ────────────────────────────────────────────────────────────
  - id: F-dom-pay-5-a
    severity: INFO
    file: packages/plugin-payments/src/webhook.ts
    line: 240
    plan_ref: F-dom-pay-5
    domain_anchor: "Secrets redaction in idempotency release-failure log path"
    summary: >
      The release() failure catch block now wraps releaseError with
      redactSecrets() before logging. This mirrors the already-redacted
      handler-error path (line 247-250) and closes the asymmetry that
      allowed DB credentials (e.g., connection strings with userinfo)
      or Stripe keys embedded in a DB error message to appear in logs.
    evidence: |
      Line 242: releaseError: redactSecrets(releaseError)
      redactSecrets covers:
        - Stripe key patterns (whsec_, sk_live_, sk_test_, pk_live_, pk_test_, rk_live_, rk_test_)
        - Basic-auth credentials in URLs (//user:pass@host pattern)
        - AggregateError flattening (errors[] messages are individually extracted)
      Test at packages/plugin-payments/tests/webhook.test.ts:388-428
        (test_release_error_is_redacted_in_log) verifies whsec_ and sk_live_ are
        replaced with ***REDACTED*** in the console.error output.
      No other unredacted console.error paths exist in webhook.ts.
    recommended_action: No action required. Fix is complete and correct.

  - id: F-dom-pay-5-b
    severity: INFO
    file: packages/plugin-payments/src/webhook.ts
    line: 187
    plan_ref: F-dom-pay-5
    domain_anchor: "redactSecrets scope — plain-text password in error messages"
    summary: >
      redactSecrets does not match plain-text passwords that appear as prose
      in DB error messages (e.g., "authentication failed for user X with
      password Y"). This is an inherent limitation of pattern-based redaction;
      the code explicitly documents it as "best-effort defense-in-depth —
      the primary guarantee is that the raw error never crosses the HTTP
      boundary at all." This is an accepted residual, not a gap in the fix.
    evidence: |
      redactSecrets(new Error('auth failed for user admin with password s3cr3t'))
      → 'Error: auth failed for user admin with password s3cr3t'  (NOT redacted)
      redactSecrets(new Error('connect to postgresql://admin:s3cr3t@db.host/payments'))
      → 'Error: connect to postgresql://***:***@db.host/payments'  (redacted)
      The URL pattern covers the common credential-in-error format for DB drivers.
      Plain-text password in prose is architecturally difficult to redact without
      producing false positives on innocuous words.
    recommended_action: >
      Acceptable as-is per documented scope. If needed in future: add structured
      logging (pino/winston with a scrubber plugin) instead of regex-patching.
      Priority: INFO — the raw error is already confined to server-side logs and
      never crosses the HTTP boundary.
