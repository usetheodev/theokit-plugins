  - id: F-dom-pay-5
    severity: LOW
    file: packages/plugin-payments/src/webhook.ts
    line: 237
    plan_ref: "T2.3 — Aggregate handler errors + sanitize the public error (#208, #201)"
    domain_anchor: "ADR D5 — redacting logger"
    summary: >
      The `releaseError` (thrown by `opts.store.release()` when the store fails to un-claim)
      is logged via `console.error` WITHOUT being passed through `redactSecrets`. If the
      store implementation (e.g. a Drizzle/Postgres adapter) includes a connection string or
      auth token in the error message (common for connection-pool errors), it would appear
      in the server log in plain text. Handler errors ARE redacted; release errors are not.
      This is a defense-in-depth gap, not a path to client-visible secret exposure.
    evidence: |
      packages/plugin-payments/src/webhook.ts:237-241:
        } catch (releaseError) {
          console.error(
            "[plugin-payments] failed to release idempotency claim after handler error:",
            { eventId: event.id, releaseError },   // <-- raw releaseError, no redactSecrets()
          );
        }
      contrast with handler error on line 245-248:
        console.error("[plugin-payments] webhook handler error:", {
          eventId: event.id,
          error: redactSecrets(error),   // <-- redacted ✓
        });
    recommended_action: >
      Apply redactSecrets() to releaseError before logging, consistent with the handler error
      path. Change:
        { eventId: event.id, releaseError }
      to:
        { eventId: event.id, releaseError: redactSecrets(releaseError) }

