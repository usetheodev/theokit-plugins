    file: packages/plugin-copilot/tests/runtime.test.ts
    line: 257
    plan_ref: "T2.1 — F-arch-2, ADR D2 Deep Dives edge case"
    summary: "F-arch-2 test covers full-room-empty pruning but omits the sibling-retention half (unregister one copilot, sibling still rotates correctly)"
    evidence: |
      Plan Deep Dives (T2.1):
        "Edge: two copilots in one room — unregister one → maps retained; unregister both → maps pruned."
      ADR D2: "Pruning is guarded on emptiness to preserve sibling rotation."

      The test at line 257 only verifies the full-empty-then-re-register scenario.
      No assertion confirms that after unregistering alpha alone, the rotation for
      the surviving copilot (beta) is unaffected (cursor not corrupted).

      grep 'sibling\|retained' packages/plugin-copilot/tests/runtime.test.ts → 0 matches.

      The implementation is correct (copilotsInRoom guard at runtime.ts:134), but
      the sibling-path is exercised only incidentally by the full-suite run-through,
      not by a targeted assertion.
    recommended_action: |
      Add a sibling-retention assertion to test_round_robin_cursor_pruned_when_room_empties:
      after unregistering alpha but BEFORE unregistering beta, emit a second broadcast and
      assert that beta responds (cursor still intact at 1 % 1 = 0 for the single remaining copilot).
      This closes the untested ADR D2 guard variant.

  - id: F-tests-tdd-order
    severity: LOW
    file: "packages/plugin-voice/tests/voice-recorder-bar.test.tsx, packages/plugin-copilot/tests/runtime.test.ts, packages/plugin-canvas/tests/sanitize.test.ts, packages/auth-google/tests/google-provider.test.ts, packages/plugin-payments/tests/webhook.test.ts"
    line: null
    plan_ref: "rules/testing.md §3 — TDD discipline"
    summary: "7 of 8 fixes committed test + implementation in a single atomic commit (no separate RED commit verifiable in history)"
    evidence: |
      Commit log 36b9d17..HEAD:
        856c667  fix(plugin-voice): ... (F-wire-1)  → test + src in same commit
        9c35fc8  fix(plugin-copilot): ... (F-arch-2) → test + src in same commit
        70464c5  fix(plugin-copilot): ... (F-conc-2) → test + src in same commit
        d173838  fix(plugin-canvas): ... (F-arch-1/F-sec-1) → test + src in same commit
        3cd718a  fix(plugin-copilot): ... (F-sec-2) → test + src in same commit
        298e5d6  fix(auth-google): ... (F-sec-3) → test + src in same commit
        c43d8e6  fix(plugin-payments): ... (F-dom-pay-5) → test + src in same commit

      Only F-tests-1 (5b4a803) has a separate test-only commit, but it is explicitly
      BORN-GREEN (documented in plan T1.2 TDD section and test comment) — not a RED→GREEN cycle.
      plan T1.2 TDD section explicitly states: "GREEN: test passes against the existing
      reservation model" — the RED stage was the review finding itself, not a failing commit.

      Atomic fix+test commits are common industry practice for bug-fix tasks and do
      not invalidate behavioral coverage; the comment in each test describes the pre-fix
      behavior ("Pre-fix the bar called createRecorder() with no args,
      so capturedOnError stays undefined → this test is RED."). The tests can be
      manually verified RED by reverting the src-only hunk of each commit.
    recommended_action: |
      For future fix cycles: prefer splitting each fix into two commits —
      (1) the failing test only, (2) the implementation that makes it green.
      This makes the RED state auditable in git history. For this cycle, the
      behavioral evidence in test comments is sufficient; no re-commit required.

  - id: F-tests-conc2-settyping-mock-assumptions
    severity: LOW
    file: packages/plugin-copilot/tests/runtime.test.ts
    line: 720
    plan_ref: "T2.2 — F-conc-2"
    summary: "F-conc-2 test assumes presenceCalls=1 is the setTyping(true) call, but the mock counts ALL updatePresence calls including setTyping(false) in finally block"
    evidence: |
      The mock at line 727: `if (presenceCalls === 1) throw new Error(...)`.

      runtime.ts flow for this test:
        Line 297: setTyping(true)  → presenceCalls = 1 → throws
        catch at 339: reg.budget.release(reservation)
        finally at 346: setTyping(false) → presenceCalls = 2 → succeeds

      presenceCalls=1 IS the setTyping(true) call because activate() does not call
      updatePresence and the test emits only one event before the assertion.
      The assertion getUsage=0 is correct — reservation IS released in catch.

      However, if the code order ever changes (e.g., a pre-flight presence update
      is added before the try block), presenceCalls=1 would no longer be setTyping(true)
      and the test would silently stop testing the intended failure path.
    recommended_action: |
      Make the mock more explicit about WHAT it is injecting: spy on the specific
      presence `patch.typing === true` condition instead of counting calls.
      Example: `if (presenceCalls === 1 && patch?.typing === true) throw ...`
      This makes the test's intent self-documenting and robust against ordering changes.
      LOW priority — the test is logically correct for the current code.

