  - id: F-arch-4
    severity: MEDIUM
    file: packages/plugin-voice/src/tts-server.ts
    line: 168
    plan_ref: "T8.1/T8.2 — ADR D8 upstream timeout composition"
    summary: >
      composeUpstreamSignal is duplicated verbatim between stt-server.ts and tts-server.ts
      — identical function body, identical signature — violating DRY within the same package.
    evidence: |
      stt-server.ts lines 160-163:
      ```ts
      function composeUpstreamSignal(opts: { timeoutMs?: number; signal?: AbortSignal }): AbortSignal {
        const timeoutSignal = AbortSignal.timeout(opts.timeoutMs ?? DEFAULT_TIMEOUT_MS)
        return opts.signal !== undefined ? AbortSignal.any([opts.signal, timeoutSignal]) : timeoutSignal
      }
      ```
      tts-server.ts lines 168-171 (identical body, identical signature):
      ```ts
      function composeUpstreamSignal(opts: { timeoutMs?: number; signal?: AbortSignal }): AbortSignal {
        const timeoutSignal = AbortSignal.timeout(opts.timeoutMs ?? DEFAULT_TIMEOUT_MS)
        return opts.signal !== undefined ? AbortSignal.any([opts.signal, timeoutSignal]) : timeoutSignal
      }
      ```
      Both files also duplicate DEFAULT_TIMEOUT_MS = 30_000 and isAbortLike().
      Per CLAUDE.md Rule 12 (DRY), the rule of 3 has been satisfied (3 identical
      occurrences across stt, tts, and potentially future providers) — extraction
      is appropriate. The function is domain-specific to the voice package and
      does not belong in a general-purpose utility.
    recommended_action: >
      Extract composeUpstreamSignal, DEFAULT_TIMEOUT_MS, and isAbortLike into a
      package-internal module (e.g., packages/plugin-voice/src/internal/signal-utils.ts).
      Import from both stt-server.ts and tts-server.ts. This also prevents future drift
      if the timeout logic is updated in one file but not the other.

  - id: F-arch-5
    severity: MEDIUM
    file: packages/plugin-canvas/src/schema.ts
    line: 49
    plan_ref: "T1.2 — SVG sanitization for data URL decode path"
    summary: >
      Domain layer (schema.ts) imports directly from the UI layer (ui/renderers/sanitize.ts),
      violating the inward-dependency rule from architecture.md §1. This is a pre-existing
      violation extended by T1.2, which added a second usage of sanitizeSvg for the SVG
      data URL decode path.
    evidence: |
      packages/plugin-canvas/src/schema.ts line 49:
      ```ts
      import { sanitizeHtmlSrcdoc, sanitizeSvg } from './ui/renderers/sanitize.js'
      ```
      Per architecture.md §1: "Inner layers MUST NOT import outer layers."
      schema.ts is domain-layer (defines artifact types, validation rules).
      ui/renderers/sanitize.ts is UI-layer (a renderer-side utility).

      T1.2 added sanitizeSvg usage at lines 267 and 338 (SVG data URL decode).
      The pre-existing usage (sanitizeHtmlSrcdoc at line 282) predates this PR,
      but T1.2 extended the coupling by adding two more call sites.

      The import was in the base commit 2f074d9 so the violation is pre-existing,
      but the review convention (cycle-review.md) requires flagging architectural
      violations even when pre-existing if they are worsened by the PR under review.
    recommended_action: >
      Move sanitization concerns to a package-internal shared module (e.g.,
      packages/plugin-canvas/src/internal/sanitize.ts or a dedicated
      packages/plugin-canvas/src/sanitize.ts at the domain root) that is neither
      domain nor UI, allowing both schema.ts and the UI renderers to import from it
      without creating a cross-layer dependency. Alternatively, schema.ts should
      accept pre-sanitized data and delegate sanitization to the UI layer caller
      (inverting the responsibility so the domain layer remains pure).

