  - id: F-dom-pay-3
    severity: INFO
    file: packages/plugin-payments/src/webhook.ts
    line: 223
    plan_ref: "T2.2 — Mark webhook processed only after successful dispatch (#167)"
    domain_anchor: "ADR D4 — claim-before-dispatch + release-on-failure"
    summary: >
      Webhook idempotency ordering is correct: claim BEFORE dispatch (prevents concurrent
      double-dispatch), release AFTER handler failure (enables Stripe retry). The memory
      store's inflight Map ensures exactly one concurrent markProcessed wins per event ID in
      a single process. Release failure is best-effort and documented (release fails →
      event stays claimed → retry dedupes with ok/duplicate — acknowledged trade-off in ADR D4).
    evidence: |
      processWebhook flow:
        1. markProcessed(event.id) → claim (atomic)
        2. dispatch() → may throw
        3a. throw: release(event.id); log; return handler_error → Stripe retries
        3b. ok: return {ok, duplicate:false}
      Concurrent delivery: second caller hits markProcessed → false (duplicate:true, ok 200)
      before dispatch completes. If dispatch then fails and release is called, the retry
      (a new Stripe delivery) can re-claim. Semantics are correct.
    recommended_action: No action required.

