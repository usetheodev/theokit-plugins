  - id: F-conc-9
    severity: INFO
    file: packages/plugin-payments/src/webhook.ts
    line: 225
    plan_ref: "T2.2 — mark-after-success ordering (#167)"
    summary: >
      webhook claim-before-dispatch is correctly implemented. CLEAN:
      markProcessed is called before dispatch, and the idempotency store's
      single-flight promise map ensures concurrent identical deliveries
      serialize deterministically (only one returns true). On dispatch failure,
      release() is called best-effort, restoring the claim so a Stripe retry
      can re-run the handler. The release-on-store-failure case is logged but
      does not re-throw (idempotent fallback: claim persists, retry dedupes).
      No race found.
    evidence: |
      const isNew = await opts.store.markProcessed(event.id);  // claim BEFORE dispatch
      if (!isNew) return { status: "ok", ..., duplicate: true };
      try {
        await opts.registry.dispatch(event);
      } catch (error) {
        await opts.store.release(event.id);   // release on failure (best-effort)
        return { status: "handler_error", ... };
      }
    recommended_action: "No action required."

