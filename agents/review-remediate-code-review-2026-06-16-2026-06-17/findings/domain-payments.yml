  - id: F-dom-pay-8
    severity: LOW
    file: packages/plugin-payments/src/stripe-client.ts
    line: 32
    plan_ref: "T2.5 — apiVersion validated against accepted set (#210)"
    domain_anchor: "ADR #210 — maintenance coupling to Stripe SDK version"
    summary: >
      ACCEPTED_API_VERSIONS is hardcoded and coupled to the installed stripe SDK version.
      When `stripe` is upgraded to a version whose `LatestApiVersion` changes (e.g. from
      '2023-10-16' to '2024-XX-XX'), TypeScript `as Stripe.LatestApiVersion` would still
      compile (the new type would accept the new string) but `ACCEPTED_API_VERSIONS` would
      reject it at runtime — silently breaking the client factory for users who pass
      opts.apiVersion = 'new-version'. This is a known trade-off accepted in the plan
      (security over convenience) but creates a maintenance invariant: every Stripe SDK
      minor-version bump that changes LatestApiVersion requires a matching code change here.
      There is no automated guard to catch the drift (no test that asserts
      ACCEPTED_API_VERSIONS matches the SDK's LatestApiVersion type at build time).
    evidence: |
      stripe@14.25.0: LatestApiVersion = '2023-10-16' — matches ACCEPTED_API_VERSIONS ✓ today
      stripe@15.x (hypothetical): LatestApiVersion = '2024-XX-XX' — would break without update
      No test in stripe-client.test.ts asserts ACCEPTED_API_VERSIONS ⊇ SDK.LatestApiVersion.
    recommended_action: >
      Add a compile-time or test-time assertion that the SDK's LatestApiVersion is in
      ACCEPTED_API_VERSIONS, for example in stripe-client.test.ts:
        import type Stripe from 'stripe';
        it('ACCEPTED_API_VERSIONS includes Stripe.LatestApiVersion', () => {
          // This test fails (type error) when the SDK version drifts past the set.
          const v: Stripe.LatestApiVersion = '2023-10-16' as Stripe.LatestApiVersion;
          expect(ACCEPTED_API_VERSIONS.has(v)).toBe(true);
        });
      Alternatively, document the SDK upgrade checklist with "update ACCEPTED_API_VERSIONS".

