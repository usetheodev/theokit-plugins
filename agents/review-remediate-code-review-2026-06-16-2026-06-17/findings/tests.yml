  - id: F-tests-5
    severity: LOW
    file: packages/plugin-realtime/tests/server-integration.test.ts
    line: 46
    plan_ref: "T4.3 Phase 4 TDD — RED: test_abort_releases_connection_handle()"
    summary: >
      The test_abort_releases_connection_handle test cannot directly assert the connection handle was
      released (i.e., that leaveRoom was called). Instead it checks `gen.next()` returns `{done:true}`
      and then infers handle-release from `getPresence("r")` returning `{}`. This is behaviorally
      correct but is weaker than the plan's intent ("handle released exactly once"). A mock to count
      leaveRoom/disconnect calls would make the assertion more precise.
    evidence: |
      packages/plugin-realtime/tests/server-integration.test.ts:46:
        expect(r.done).toBe(true); // generator exits on abort
        expect(await provider.getPresence("r")).toEqual({}); // handle released → left the room

      The test correctly proves the generator terminates and the room is left, but does not assert
      exactly-once semantics for the handle release (a double-release would not be caught here).
      Plan T4.3 Acceptance Criteria: "Abort releases handle once; no post-abort enqueue; queue bounded"
    recommended_action: >
      Acceptable as-is for this review cycle — the behavioral assertion (room empty, generator done) is
      sufficient to prove the defect is fixed. For exactness, consider adding a disconnect spy that
      counts calls (it is already used in the flood test), but this is INFO-level hygiene, not a blocking
      finding.

  - id: F-tests-6
    severity: INFO
    file: packages/plugin-voice/tests/stt-server.test.ts
    line: 174
    plan_ref: "T5.1 Phase 5 TDD — RED: fetchImpl that never resolves (fake timers) → 504 UPSTREAM_TIMEOUT"
    summary: >
      The plan prescribed a "fetchImpl that never resolves (fake timers)" approach for the timeout→504
      test, but the implementation uses a pre-aborted AbortSignal instead. This is a valid and more
      deterministic approach: a pre-aborted signal causes the handler to immediately receive the same
      AbortError that AbortSignal.timeout() would produce after the deadline. The test comment
      documents this explicitly. No behavioral coverage is lost.
    evidence: |
      Plan T5.1 TDD:
        "RED: test_stt_times_out_with_504_and_signal() — fetchImpl that never resolves (fake timers) → 504"

      Implemented (stt-server.test.ts:174-196):
        // Deterministic: a pre-aborted client signal must surface as 504 UPSTREAM_TIMEOUT,
        // and the handler MUST pass an AbortSignal to fetch.
        const controller = new AbortController()
        controller.abort()
        ...
        expect(res.status).toBe(504)
        expect((await res.json()).error.code).toBe('UPSTREAM_TIMEOUT')
        expect(fetchImpl.mock.calls[0]![1]!.signal).toBeInstanceOf(AbortSignal)

      This tests the same AbortError→504 code path that AbortSignal.timeout() triggers. The
      pre-abort approach avoids the complexity of fake timers coordinating with platform-native
      AbortSignal.timeout (which is a Web platform API, not a Node timer).
    recommended_action: >
      No action required. The deviation is documented in the test comment and is technically superior
      to fake-timer coordination for platform AbortSignal.timeout(). INFO only.
