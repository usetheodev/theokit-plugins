      // settled-once in reconcile/release:
      if (reservation.settled) return;
      reservation.settled = true;
      // Math.max(0) clamp prevents negative budget:
      s.dailyUsedUsd = Math.max(0, s.dailyUsedUsd + dailyDelta);
