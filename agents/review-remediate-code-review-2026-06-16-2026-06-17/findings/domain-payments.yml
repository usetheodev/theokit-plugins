  - id: F-dom-pay-2
    severity: LOW
    file: packages/plugin-payments/src/currency.ts
    line: 83
    plan_ref: "T2.1 — integer-exact scaling (#199)"
    domain_anchor: "scaleToMinorUnits string-based rounding"
    summary: >
      scaleToMinorUnits uses `fracRaw.charCodeAt(decimals) - 48 >= 5` to detect the rounding
      digit. When `fracRaw` has fewer characters than `decimals`, `charCodeAt(decimals)` returns
      NaN, which makes `NaN - 48 = NaN` and `NaN >= 5 = false` (no round-up). This is
      the CORRECT behavior (e.g. 1.5 USD: fracRaw='5', charCodeAt(2)=NaN → roundUp=false,
      base=150). However the NaN arithmetic is a latent readability hazard: a future maintainer
      may mistake the NaN path for a bug and "fix" it incorrectly. The logic is safe but
      relies on JS's defined NaN semantics in a subtle way that deserves a comment.
    evidence: |
      // fracRaw='5', decimals=2: keep='50', charCodeAt(2)=NaN, NaN-48=NaN, NaN>=5=false → no roundUp
      // fracRaw='',  decimals=2: keep='00', charCodeAt(2)=NaN, same result → correct
      // All test cases pass. Risk is maintainability, not correctness.
    recommended_action: >
      Add a comment explaining that `charCodeAt(decimals)` returns NaN when `fracRaw` is
      shorter than `decimals`, and NaN comparisons in JS return false (no round-up), which
      is the correct behavior. Example:
        // charCodeAt returns NaN when index >= string length; NaN >= 5 is false (no round-up) — intentional.

