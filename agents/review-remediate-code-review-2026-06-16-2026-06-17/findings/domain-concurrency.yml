  - id: F-conc-6
    severity: INFO
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 84
    plan_ref: "T6.2 — round-robin cursor per room (#220)"
    summary: >
      roundRobinDecision Map holds a reference to the most-recent CopilotFrame
      object per room indefinitely (until overwritten by the next frame for that
      room). In a quiet room (no new frames after a period), the last frame
      object is retained as long as the CopilotRuntime instance lives. This is
      minor memory retention (one frame per room), not a leak per se, but could
      accumulate across many rooms in a long-lived server process. Not a
      correctness issue.
    evidence: |
      private readonly roundRobinDecision = new Map<string, { frame: CopilotFrame; chosen: string[] }>();
      // Entry is overwritten on every new frame per room, but never deleted
      // when a room goes idle or is removed from the runtime.
    recommended_action: >
      Low priority. If the runtime serves many short-lived rooms, consider
      clearing the roundRobinDecision entry inside deactivate() or
      unregisterCopilot() for the room. Alternatively, document the known
      retention and add a comment.

