  - id: F-arch-6
    severity: LOW
    file: packages/plugin-copilot/src/internal/budget-bridge.ts
    line: 187
    plan_ref: "T7.1/T7.2 — budget bridge reservation token pattern"
    summary: >
      BudgetBridge.charge() has no production callers — it is only invoked in
      tests/budget-bridge.test.ts. On a class marked @internal this is bounded risk,
      but it adds maintenance surface and may indicate an incomplete wiring of the
      actual-cost accounting path.
    evidence: |
      packages/plugin-copilot/src/internal/budget-bridge.ts lines 187-193:
      ```ts
      charge(copilotId: string, roomId: string, actualUsd: number): void {
        if (this.config === undefined || this.config.perRoom === undefined) return;
        const s = this.getOrInitState(this.getKey(copilotId, roomId));
        s.dailyUsedUsd += actualUsd;
        s.monthlyUsedUsd += actualUsd;
      }
      ```
      grep -rn ".charge(" packages/plugin-copilot/src/ (excluding tests): zero results.
      The reserve/reconcile/release pattern is fully wired via runtime.ts, but charge()
      — which posts actual cost without reservation — has no call site in production code.
    recommended_action: >
      If charge() is intentionally a future hook (e.g., for telemetry or for callers
      that bypass reservation), add a JSDoc comment explaining the intended caller and
      when to use it vs reconcile(). If it is dead code, remove it to keep the interface
      minimal (ISP — clients should not be burdened by methods they do not use).

