findings:
  - id: F-tests-wire-1
    severity: HIGH
    file: packages/plugin-voice/tests/voice-recorder-bar.test.tsx
    line: 335
    plan_ref: "T1.1 — F-wire-1"
    summary: "test_in_recording_error_surfaces_via_onError fails when run sequentially in the full suite (DOM not cleaned between tests due to async leak from test 1)"
    evidence: |
      npx --prefix packages/plugin-voice vitest run packages/plugin-voice/tests/voice-recorder-bar.test.tsx
        Tests  9 failed | 1 passed (10)
      Error: Found multiple elements by: [data-testid="voice-recorder-button"]
        at voice-recorder-bar.test.tsx:354:24

      Test 1 (bar_toggles_recording_state) leaves DOM elements in the JSDOM document.
      setup.ts registers afterEach(cleanup) globally, but test 1 does NOT await resolution of
      its final `resolveStop` → fetch promise chain before the test function returns.
      The leftover component from test 1 stays mounted; test 2 onwards finds two buttons.

      The F-wire-1 test passes in isolation:
        npx ... vitest run ... -t "test_in_recording_error_surfaces_via_onError"
        Tests  1 passed | 9 skipped (10)

      Root cause is PRE-EXISTING (test 1 is unchanged in commit 856c667); commit 856c667
      added the F-wire-1 test at the end of the suite where the leak is already present.
    recommended_action: |
      Fix the pre-existing DOM leak in test 1 (bar_toggles_recording_state): either
      resolve the fetch mock inside an `await act(async () => { rec.resolveStop(...); })`
      block that flushes the STT fetch promise before the test exits, or
      add `await vi.runAllTimersAsync()` / `await Promise.resolve()` loops to drain the
      microtask queue so the component unmounts cleanly before cleanup() runs.
      This is NOT introduced by the new F-wire-1 test but the new test cannot be validated
      as passing in the full suite until the pre-existing leak is fixed.

  - id: F-tests-arch-2-sibling
