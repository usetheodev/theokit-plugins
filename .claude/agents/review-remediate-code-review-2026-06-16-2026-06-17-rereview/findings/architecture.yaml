  # ─── packages/plugin-voice/src/ui/voice-recorder-bar.tsx ───────────────────

  - id: F-arch-rr-1
    severity: LOW
    file: packages/plugin-voice/src/ui/voice-recorder-bar.tsx
    line: 135
    plan_ref: T1.1 Acceptance Criteria
    summary: >
      `recorderRef.current` not reset to `null` after `onError` fires — a
      subsequent retry path re-uses the errored recorder instead of
      constructing a new one, but this is pre-existing behavior, not
      introduced by the fix.  The fix itself (passing `{ onError: surface }`)
      is correct and minimal.  No new architectural violation introduced.
    evidence: |
      ```tsx
      recorder = (recorderFactory ?? createRecorder)({ onError: surface })
      recorderRef.current = recorder
      ```
      The recorder is cached in `recorderRef` and reused on subsequent
      `start()` calls.  The `onError` wire-up is correct; the stale-recorder
      concern predates this diff.  Noting as LOW so the reviewer is aware; it
      is not a regression from the fix.
    recommended_action: >
      Pre-existing: on `surface(err)` the bar transitions to `phase='error'`
      but `recorderRef.current` stays set.  The user's next click triggers
      `clear()` → `phase='idle'`, then `start()` → the cached recorder is
      re-used.  If the recorder is irrecoverably broken after an error, a
      new one should be created.  Track as separate backlog item; do not
      block this PR.

