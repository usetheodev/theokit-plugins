findings:
  - id: F-conc-1
    severity: MEDIUM
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 140
    plan_ref: "T6.2 — one queue + atomic budget + idle guard; ADR D7"
    summary: >
      activate() has a check-then-act race across async awaits: two concurrent
      callers both observe reg.unsubscribeRoom === undefined before the first
      caller assigns it, causing both to call member.join() and subscribeRoom().
      The second assignment overwrites the first subscription reference, leaking
      the first subscription (it is never unsubscribed on deactivate, so the
      listener lives forever in the provider's subscriber set).
    evidence: |
      // activate() line 140 — guard is checked synchronously but assignment is
      // after three await points (ensureVoicePeer, ensureCanvasPeer, member.join):
      if (reg.unsubscribeRoom !== undefined) return; // <- non-atomic: both A and B pass
      await ensureVoicePeer(reg.descriptor.voice);   // A awaits, B awaits (same check passed)
      await ensureCanvasPeer(reg.descriptor.canvas);
      await reg.member.join();                        // called TWICE (join leak)
      reg.active = true;
      reg.unsubscribeRoom = this.provider.subscribeRoom(...); // B overwrites A → A's sub leaked
    recommended_action: >
      Introduce a synchronous "activation promise" field on CopilotRegistration:
      set it to the in-flight activate promise before the first await, and if
      a concurrent caller finds it non-null, return/await that promise instead
      of re-entering the activation path. Alternatively, accept that activate()
      is not concurrent-safe and document it as a caller contract (add a test
      that asserts only one join and one subscribeRoom call happens even when
      activate is called twice before the first await settles).

  - id: F-conc-2
    severity: LOW
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 284
    plan_ref: "T6.2 — one queue + atomic budget + idle guard; EC-2 reservation release on failure"
    summary: >
      reg.member.setTyping(true) at line 284 is called OUTSIDE the inner
      try-catch-finally block that releases the budget reservation. If
      setTyping(true) throws (e.g., the provider implementation throws), the
      reservation is never settled (neither reconcile nor release is called),
      permanently leaking the estimated cost from the budget until the window
      resets. In JS environments where member.broadcastEvent or similar throws
      synchronously this gap is reachable.
    evidence: |
      // After the outer try-catch (reserve succeeds), before the inner try block:
      await reg.member.setTyping(true);   // line 284 — OUTSIDE the inner try-finally

      let finalText = "";
      try {                               // line 287 — inner try (reconcile/release live here)
        ...
      } catch (cause) {
        reg.budget.release(reservation);  // never reached if setTyping threw
        ...
      } finally {
        reg.budget.release(reservation);  // never reached if setTyping threw
        ...
      }
    recommended_action: >
      Move the `await reg.member.setTyping(true)` call inside the inner try
      block (after line 287 `let finalText = ""`), so any throw from setTyping
      is caught by the finally block that releases the reservation.

  - id: F-conc-3
    severity: LOW
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 121
    plan_ref: "T6.2 — one queue + atomic budget + idle guard (#221 active flag)"
    summary: >
      unregisterCopilot() does not set reg.active = false and does not drain
      the per-copilot queue before calling member.leave(). A task enqueued
      just before unregisterCopilot() runs will execute on a "live" reg object
      but against a member that has already left the room, potentially calling
      broadcastMessage/broadcastEvent/setTyping on a disconnected member. The
      plan's active flag + queue drain is only wired in deactivate(), not in
      unregisterCopilot(). The plan does not explicitly address this path.
    evidence: |
      async unregisterCopilot(id: string): Promise<boolean> {
        const reg = this.registry.get(id);
        if (reg === undefined) return false;
        reg.unsubscribeRoom?.();    // stops new frames arriving
        reg.unscheduleIdle?.();     // stops idle timer
        await reg.member.leave();   // member leaves room
        this.evaluator.clearRoom(reg.descriptor.room.id);
        this.registry.delete(id);
        return true;
        // Missing: reg.active = false; await this.queues.get(id); this.queues.delete(id);
      }
    recommended_action: >
      Mirror deactivate()'s teardown sequence inside unregisterCopilot: set
      reg.active = false before unsubscribeRoom, then await this.queues.get(id)
      before calling member.leave() and deleting from registry.

  - id: F-conc-4
    severity: LOW
    file: packages/plugin-voice/src/ui/use-tts.ts
    line: 227
    plan_ref: "T5.5 — use-tts stale-playback bail (#216)"
    summary: >
      The catch block for audio.play() failure (line 227) does not check
      isStale() before calling setError() / setPhase('error'). If play()
      rejects on a stale speak() call (a newer speak()/stop() was called while
      play() was resolving), the stale error overwrites the newer call's error
      and phase state. The success path immediately after play() does check
      isStale() (line 220), but the failure path does not.
    evidence: |
      try {
        await audio.play()
        if (isStale()) {             // ← correct staleness guard on success
          ...
          return
        }
        setPhase('playing')
      } catch (err) {
        // No isStale() check here — stale error clobbers newer call's state
        const wrapped = ...
        cleanupAudio()
        setError(wrapped)            // ← overwrites newer call's error state
        setPhase('error')            // ← overwrites newer call's phase state
        onErrorRef.current?.(wrapped)
      }
    recommended_action: >
      Add `if (isStale()) { cleanupAudio(); return; }` as the first line of
      the catch block for audio.play() failure (before calling setError /
      setPhase), so a stale play() rejection is silently discarded.

