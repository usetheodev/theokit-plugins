findings:
  - id: F-wire-1
    severity: HIGH
    file: packages/plugin-voice/src/ui/voice-recorder-bar.tsx
    line: 132
    plan_ref: "T5.2 — Recorder: release stream + surface error on recording error (#213, test #237)"
    summary: >
      VoiceRecorderBar creates its recorder with `createRecorder()` (no options), so the new
      `onError` callback introduced by T5.2 is never wired to the bar's own `surface()` handler.
      When a MediaRecorder fires an `error` event during recording with no pending `stop()`,
      the recorder correctly calls `releaseStream()` (T5.2 fix) and sets its internal state to
      `idle` — but the bar's React state remains `'recording'` indefinitely.  The error is
      eventually surfaced only when the user manually clicks Stop, at which point `recorder.stop()`
      rejects with a misleading "stop() called in state 'idle'" VoicePluginError rather than the
      original MediaRecorder error.  The original cause is silently lost.  No test covers this
      end-to-end scenario through the bar.
    evidence: |
      packages/plugin-voice/src/ui/voice-recorder-bar.tsx:132
        recorder = (recorderFactory ?? createRecorder)()   // no opts — onError never set

      packages/plugin-voice/src/recorder.ts:74
        onError?: (err: VoicePluginError) => void           // T5.2 option

      packages/plugin-voice/src/recorder.ts:156-157
        onError?.(mapped)                                   // fires if opts.onError set;
                                                            // bar never sets it → silent

      packages/plugin-voice/tests/recorder.test.ts:285-298
        const recorder = createRecorder({ onError })        // unit test wires it correctly
        // No bar-level integration test for this scenario

      Recorder interface (recorder.ts:43-49): no event/state-change mechanism for the bar to
      poll or subscribe to mid-recording errors other than the onError callback option.

      Stop path: after the in-recording error the recorder's state is 'idle'; when the bar's
      user clicks Stop, recorder.stop() rejects with VoicePluginError("stop() called in state
      'idle'") — the bar surfaces THIS error via surface(), not the original MediaRecorder error.
    recommended_action: >
      In VoiceRecorderBar, pass the bar's own `surface` callback as `onError` when creating
      the recorder:
        recorder = (recorderFactory ?? createRecorder)({ onError: surface })
      This requires either (a) separating recorder creation from the lazy-init block so `surface`
      is in scope with stable reference (it's a useCallback, so stable), or (b) storing surface
      in a ref.  Add a test in voice-recorder-bar.test.tsx that simulates a MediaRecorder error
      event while in 'recording' phase (using the fakeRecorder's emitError helper) and asserts:
      (1) bar transitions to 'error' phase, (2) bar's onError prop is called with the original
      VoicePluginError, (3) subsequent click transitions back to 'idle'.

  - id: F-wire-2
    severity: MEDIUM
    file: packages/plugin-forms/src/components/TheoForm.tsx
    line: 181
    plan_ref: "T8.2 — Forms: test the real component, not a copy (#227)"
    summary: >
      `routeActionError` and `extractFieldsFromError` are exported from TheoForm.tsx with
      `@public` JSDoc but are NOT re-exported from the package's public barrel
      (`packages/plugin-forms/src/index.ts`).  The package.json exports map exposes only
      `dist/index.js` (the compiled barrel).  The test imports them via the internal source
      path `../../src/components/TheoForm.js` — a non-public deep import that bypasses the
      package exports contract.  External consumers who follow the exports map cannot reach
      these symbols.  This creates a latent API surface issue: the symbols are marked public
      in their docstrings but are not part of the declared public API.
    evidence: |
      packages/plugin-forms/src/index.ts — does NOT export routeActionError or
      extractFieldsFromError (confirmed by grep).

      packages/plugin-forms/src/components/TheoForm.tsx:181
        export function extractFieldsFromError(...) { ... }  // @public in JSDoc

      packages/plugin-forms/src/components/TheoForm.tsx:196
        export function routeActionError(...) { ... }        // @public in JSDoc

      packages/plugin-forms/package.json exports:
        ".": { "types": "./dist/index.d.ts", "import": "./dist/index.js" }
        // Only the barrel is exposed; no sub-path for TheoForm.js

      packages/plugin-forms/tests/unit/TheoForm.test.tsx:13
        import { extractFieldsFromError, routeActionError }
          from "../../src/components/TheoForm.js";   // deep source import, not public API
    recommended_action: >
      Either (a) add `export { routeActionError, extractFieldsFromError } from
      "./components/TheoForm.js"` to `src/index.ts` to honour the `@public` JSDoc, OR
      (b) remove the `export` keyword from both functions (making them module-private) and
      update the test to use a barrel re-export or a separate test-helper file.
      Option (b) aligns with the plan's intent ("Exported so the component and its unit test
      share ONE implementation") but avoids polluting the public API with helpers that
      external consumers do not need.  The `@public` JSDoc tags should then be removed.

