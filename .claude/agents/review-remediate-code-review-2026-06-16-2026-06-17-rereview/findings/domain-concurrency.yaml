    plan_ref: "T2.1 — concurrent dispatch race concern"
    domain_anchor: "JS single-threaded event loop + enqueue() per-copilot serialization queue"
    summary: "No race between pruning and an in-flight dispatch. unregisterCopilot is async but the only await before the prune is reg.member.leave() (line 127). Between leave() completing and the prune executing, no other microtask can interleave because the prune is synchronous after the await. Any in-flight handleFrame/runAgent was already enqueued before unregisterCopilot was called — it either already read roundRobinDecision (frame identity cached) or will read it after prune, in which case it gets a fresh cursor=0 (correct: room now has zero copilots, and the only case where a new frame can dispatch into the now-empty room is via a stale subscription that was already cancelled by reg.unsubscribeRoom?.() at line 125). The temporal ordering is: unsubscribeRoom (line 125) → no new frames dispatched → leave (line 127) → delete registry (line 129) → prune maps (lines 134–137). Safe."
    evidence: |
      # unregisterCopilot lines 124–138
      reg.unsubscribeRoom?.();   // line 125: unsubscribes FIRST — no new frames
      reg.unscheduleIdle?.();    // line 126
      await reg.member.leave();  // line 127: only await before the prune
      this.evaluator.clearRoom(...); // line 128
      this.registry.delete(id);  // line 129
      // prune at lines 134–137 — synchronous, no await, no interleave possible
    recommended_action: "No action required. Concurrency analysis confirms the ordering is safe."

