    severity: INFO
    file: packages/plugin-copilot/tests/runtime.test.ts
    line: 750
    plan_ref: "T1.2 — F-tests-1"
    summary: "F-tests-1 is explicitly BORN-GREEN (regression guard, not RED→GREEN fix). Test is behaviorally sound but not a strict TDD RED→GREEN cycle."
    evidence: |
      Comment at line 751: "BORN-GREEN: the reservation model ... already prevents double-spend."
      Plan T1.2 TDD: "GREEN: test passes against the existing reservation model
      (proves no runtime-level double-spend)."

      The test correctly exercises concurrent idle+broadcast against a tight budget
      with a gated agent (vi.useFakeTimers + resolveAgent release pattern).
      Assertions: getUsage=0.01 (exactly one charge), onResponse called once,
      budget-exceeded broadcast emitted. These are meaningful invariants.

      BORN-GREEN tests are legitimate for proving existing guarantees under named
      regression scenarios (cf. testing.md §3 — "Every bug fix starts with a
      failing regression test"). Here the "fix" is the review finding (the missing
      test coverage), not a code defect.
    recommended_action: "No action required. Document this pattern in the project's testing.md if BORN-GREEN regression guards become a recurring pattern."

