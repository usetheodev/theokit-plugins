  - id: F-arch-rr-4
    severity: INFO
    file: packages/plugin-copilot/src/internal/runtime.ts
    line: 406
    plan_ref: T3.2 Acceptance Criteria
    summary: >
      INFO — fixpoint fence-strip loop is correct, terminates provably (each
      pass strictly shrinks the string), and addresses the single-pass
      reconstruction bypass.  No pattern misuse.
    evidence: |
      ```ts
      let sanitized = text;
      for (;;) {
        const next = sanitized
          .split(UNTRUSTED_OPEN).join("")
          .split(UNTRUSTED_CLOSE).join("");
        if (next === sanitized) break;
        sanitized = next;
      }
      ```
      Four nested-marker vectors (A: OPEN self-recon, B: CLOSE self-recon,
      C: cross-marker, D: deeply-nested 3-pass) are tested.  Termination:
      `split(S).join("")` strictly removes all occurrences of S; if no S
      present the string is unchanged and the loop breaks.  No new imports,
      no cross-module coupling.
    recommended_action: No action required.

  # ─── packages/plugin-canvas/src/ui/renderers/sanitize.ts ──────────────────

  - id: F-arch-rr-5
    severity: MEDIUM
    file: packages/plugin-canvas/src/ui/renderers/sanitize.ts
    line: 168
    plan_ref: T3.1 — "fold every dangerous-removal signal into removedScript"
    summary: >
      `sanitizeHtmlSrcdoc` now encodes a security policy decision (which
      removal flags → block) that belongs to `enforceArtifactSecurity` in
      `schema.ts`.  The OR-fold inside the sanitizer function gives it two
      reasons to change: (a) when the sanitization mechanism changes and (b)
      when the security policy (which flags are dangerous for HTML) changes.
      This is an SRP stretch introduced by the fix.
    evidence: |
      ```ts
      return {
        output,
        report: {
          ...full,
          removedScript:
            full.removedScript ||
            full.removedIframe ||
            full.removedObject ||
            full.removedEmbed ||
            full.removedOnHandler ||
            full.removedJsUrl ||
            full.removedDataUrl,
        },
      }
      ```
      The caller in `schema.ts` (line 285) checks only `report.removedScript`.
      The policy "iframes and embeds are as dangerous as scripts for srcdoc"
      is baked into the sanitizer rather than into the security gate.  The
      plan's ADR D1 documents the rationale: avoid touching `schema.ts` (which
      already has the backlogged F-arch-5 layering violation, where
      `schema.ts:49` imports `./ui/renderers/sanitize.js`).  The trade-off is
      explicit and the individual flags are preserved in the returned report.
    recommended_action: >
      ACCEPTABLE as a deliberate trade-off (documented in plan ADR D1 with
      explicit rationale).  Not a blocker.  When F-arch-5 is resolved
      (schema layering cleanup), move the OR-fold into
      `enforceArtifactSecurity`'s html branch so the sanitizer is
      responsibility-pure (returns raw classified flags; the security gate
      interprets them).  Track as part of the F-arch-5 backlog work.

  - id: F-arch-rr-6
    severity: LOW
    file: packages/plugin-canvas/src/ui/renderers/sanitize.ts
    line: 159
    plan_ref: T3.1 — WHOLE_DOCUMENT option
    summary: >
      `WHOLE_DOCUMENT: true` changes the `output` string shape from a body
      fragment (`<p>hi</p>`) to a full document wrapper
      (`<html><head><body><p>hi</p></body></html>`).  The `HtmlArtifact`
      renderer at `html-artifact.tsx:36` consumes `output` as `srcDoc`.
      The comment justifies browser equivalence, but no test asserts the
      exact `output` structure for the benign-HTML path after the fix.
    evidence: |
      ```tsx
      // html-artifact.tsx:36
      const { output } = useMemo(() => sanitizeHtmlSrcdoc(artifact.srcdoc), [artifact.srcdoc])
      // ...
      srcDoc={output}
      ```
      After the fix, `output` for `sanitizeHtmlSrcdoc('<p>hi</p>')` will be
      something like `<html><head></head><body><p>hi</p></body></html>`.
      The existing test at `sanitize.test.ts:136` asserts
      `expect(output).toContain('<p>hi</p>')` which still passes, but does
      not confirm the wrapper does not break rendering.  The code comment
      at sanitize.ts:155-157 provides the theoretical justification
      (browsers auto-wrap body fragments in srcdoc regardless), and srcdoc
      semantics per HTML spec §iframe.srcdoc confirm this.
    recommended_action: >
      LOW — theoretical risk only; HTML spec and comment justify equivalence.
      Consider adding a regression test that asserts `output` for a simple
      clean-HTML input does NOT inject extra visible content when set as
      `srcDoc` (e.g. assert `<p>hi</p>` is inside the body and no unexpected
      elements appear).  Not a blocker for this PR.

  # ─── packages/auth-google/src/index.ts ────────────────────────────────────

  - id: F-arch-rr-7
    severity: INFO
    file: packages/auth-google/src/index.ts
    line: 59
    plan_ref: T3.3 Acceptance Criteria
    summary: >
      INFO — removing `"0.0.0.0"` from `isLoopbackHost` is a minimal,
      correct, single-purpose change.  No SRP, OCP, DIP, or coupling
      issues.  Two tests cover the short-form normalization vector as well.
    evidence: |
      ```ts
      if (
        hostname === "localhost" ||
        hostname === "[::1]" ||
        hostname === "::1"
      ) {
        return true;
      }
      return /^127\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(hostname);
      ```
      The removal leaves loopback semantics correct: `localhost`, `::1`,
      `[::1]`, and the full `127.0.0.0/8` range remain exempt.  `0.0.0.0`
      (INADDR_ANY) and the normalized form of `http://0/` (→ hostname `0.0.0.0`)
      are both now rejected.  Comment in the code explains the IPv6 unspecified
      `[::]` was never in this set — consistent with the removal.
    recommended_action: No action required.

